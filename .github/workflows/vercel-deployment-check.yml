name: Vercel Deployment Integrity Check

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  integrity-check:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run TypeScript type checking
      run: npm run type-check
      
    - name: Run ESLint
      run: npm run lint
      
    - name: Run build validation
      run: npm run build
      
    - name: Run Vercel integrity checker
      run: npm run vercel:check
      
    - name: Check for build artifacts
      run: |
        if [ ! -d ".next" ]; then
          echo "❌ Build failed - .next directory not found"
          exit 1
        fi
        echo "✅ Build artifacts found"
        
    - name: Validate environment variables
      run: |
        if [ ! -f ".env.local" ]; then
          echo "⚠️  .env.local not found - ensure environment variables are set in Vercel dashboard"
        else
          echo "✅ Environment file found"
        fi

  vercel-preview:
    runs-on: ubuntu-latest
    needs: integrity-check
    if: github.event_name == 'pull_request'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Install Vercel CLI
      run: npm install -g vercel@latest
      
    - name: Deploy to Vercel Preview
      run: vercel --token ${{ secrets.VERCEL_TOKEN }} --yes
      env:
        VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        
    - name: Comment PR with preview URL
      uses: actions/github-script@v7
      with:
        script: |
          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });
          
          const botComment = comments.find(comment => 
            comment.user.type === 'Bot' && comment.body.includes('Preview deployment')
          );
          
          const previewUrl = process.env.VERCEL_PREVIEW_URL || 'https://preview-url-here';
          
          const body = `🚀 **Preview Deployment Ready**
          
          **URL:** ${previewUrl}
          
          **Status:** ✅ All integrity checks passed
          
          **Checks Completed:**
          - ✅ TypeScript type checking
          - ✅ ESLint validation  
          - ✅ Build validation
          - ✅ Vercel integrity check
          
          Ready for review! 🎉`;
          
          if (botComment) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: botComment.id,
              body: body
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
          }
